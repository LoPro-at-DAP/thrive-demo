<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Thrive AI — Interactive Architecture Walkthrough</title>
<style>
  :root {
    --bg:#0a0e1a;--bg-panel:#111827;--bg-panel-2:#1f2937;--bg-panel-3:#2d3748;
    --border:#374151;--border-light:#4b5563;--text:#f3f4f6;--text-dim:#9ca3af;
    --text-dimmer:#6b7280;--accent:#3b82f6;--accent-2:#60a5fa;--accent-3:#93c5fd;
    --green:#10b981;--green-light:#34d399;--yellow:#f59e0b;--yellow-light:#fbbf24;
    --red:#ef4444;--red-light:#f87171;--purple:#8b5cf6;--purple-light:#a78bfa;
    --pink:#ec4899;--pink-light:#f9a8d4;--cyan:#06b6d4;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;margin:0;padding:0;overflow:hidden;touch-action:none;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;font-size:13px;position:fixed;width:100%;height:100%;}
  #app{display:grid;grid-template-rows:auto 1fr;height:100vh;height:100dvh;max-height:100vh;max-height:100dvh;overflow:hidden;}
  header{background:var(--bg-panel);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
  header h1{font-size:17px;font-weight:700;letter-spacing:-0.3px;}
  header h1 span{background:linear-gradient(135deg,#60a5fa,#8b5cf6,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  header .subtitle{font-size:11px;color:var(--text-dim);letter-spacing:0.3px;}
  nav#scene-nav{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap;}
  nav button{background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:7px 12px;font-size:12px;border-radius:6px;cursor:pointer;font-family:inherit;transition:all 0.15s;font-weight:500;}
  nav button:hover{border-color:var(--accent);color:var(--text);}
  nav button.active{background:var(--accent);border-color:var(--accent);color:white;}
  main{display:grid;grid-template-columns:1fr 420px;overflow:hidden;min-height:0;}
  #canvas-container{position:relative;background:var(--bg);overflow:hidden;min-height:0;}
  #canvas-container canvas{display:block;touch-action:none;}
  aside#info-panel{background:var(--bg-panel);border-left:1px solid var(--border);padding:24px;overflow-y:auto;}
  aside#info-panel::-webkit-scrollbar{width:8px;}
  aside#info-panel::-webkit-scrollbar-track{background:var(--bg-panel);}
  aside#info-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
  #info-panel h2{font-size:22px;font-weight:700;margin-bottom:10px;letter-spacing:-0.3px;}
  #info-panel .lead{font-size:13px;color:var(--text-dim);margin-bottom:18px;line-height:1.55;}
  #info-panel h3{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.9px;color:var(--accent-2);margin-top:18px;margin-bottom:8px;}
  #info-panel p{font-size:13px;line-height:1.55;margin-bottom:9px;}
  #info-panel strong{color:var(--accent-2);}
  #info-panel ul{list-style:none;padding:0;}
  #info-panel li{font-size:12px;padding:7px 0;border-bottom:1px solid var(--border);line-height:1.5;}
  #info-panel li:last-child{border-bottom:none;}
  code{font-family:"SF Mono",Menlo,Consolas,monospace;font-size:11px;background:var(--bg-panel-2);padding:2px 6px;border-radius:3px;color:var(--accent-3);}
  .detail-box{background:var(--bg-panel-2);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:6px;padding:14px;margin-top:12px;font-size:12px;}
  .detail-box .title{font-weight:700;color:var(--accent-2);margin-bottom:6px;font-size:13px;}
  .detail-box .meta{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;}
  .overlay-hint{position:absolute;bottom:18px;left:18px;background:rgba(17,24,39,0.88);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:6px;padding:9px 14px;font-size:11px;color:var(--text-dim);pointer-events:none;}
  .stage-counter{position:absolute;top:18px;left:18px;background:rgba(17,24,39,0.88);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:6px;padding:10px 14px;font-size:12px;font-weight:600;}
  .stage-counter .small{font-size:10px;color:var(--text-dim);font-weight:400;text-transform:uppercase;letter-spacing:0.5px;}
  .breadcrumb{position:absolute;top:18px;right:18px;background:rgba(17,24,39,0.88);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:6px;padding:9px 14px;font-size:11px;color:var(--text-dim);max-width:380px;}
  .breadcrumb .crumb{color:var(--text);}
  .breadcrumb .sep{color:var(--text-dimmer);margin:0 6px;}
  .pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;margin-right:4px;text-transform:uppercase;letter-spacing:0.3px;}
  .pill.red{background:rgba(239,68,68,0.18);color:var(--red-light);border:1px solid rgba(239,68,68,0.3);}
  .pill.yellow{background:rgba(245,158,11,0.18);color:var(--yellow-light);border:1px solid rgba(245,158,11,0.3);}
  .pill.green{background:rgba(16,185,129,0.18);color:var(--green-light);border:1px solid rgba(16,185,129,0.3);}
  .pill.purple{background:rgba(139,92,246,0.18);color:var(--purple-light);border:1px solid rgba(139,92,246,0.3);}
  .pill.blue{background:rgba(59,130,246,0.18);color:var(--accent-2);border:1px solid rgba(59,130,246,0.3);}
  .pill.gray{background:rgba(107,114,128,0.2);color:var(--text-dim);border:1px solid rgba(107,114,128,0.3);}
  .legend-row{display:flex;align-items:center;gap:10px;margin-bottom:7px;font-size:12px;}
  .legend-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
  .legend-bar{width:14px;height:3px;border-radius:2px;flex-shrink:0;}
  .scoreboard{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:14px 0;}
  .score-tile{background:var(--bg-panel-2);border:1px solid var(--border);border-radius:6px;padding:12px 8px;text-align:center;}
  .score-tile .num{font-size:22px;font-weight:700;color:var(--accent-2);}
  .score-tile .lbl{font-size:9px;color:var(--text-dim);text-transform:uppercase;margin-top:2px;letter-spacing:0.4px;}
  .dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0;}
  .dash-card{background:var(--bg-panel-2);border:1px solid var(--border);border-radius:6px;padding:10px 12px;}
  .dash-card .label{font-size:9px;text-transform:uppercase;color:var(--text-dim);letter-spacing:0.5px;margin-bottom:4px;}
  .dash-card .value{font-size:16px;font-weight:700;color:var(--text);}
  .dash-card .sub{font-size:10px;color:var(--text-dim);margin-top:2px;}
  .topic-risk-row{display:grid;grid-template-columns:1fr 50px 70px;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:11px;}
  .topic-risk-row:last-child{border-bottom:none;}
  .topic-risk-row .topic-name{color:var(--text);font-weight:500;}
  .topic-risk-row.future .topic-name{color:var(--text-dimmer);font-weight:400;}
  .topic-risk-row .score{text-align:right;font-weight:600;font-family:"SF Mono",monospace;font-size:11px;}
  .hw-row{display:grid;grid-template-columns:16px 1fr 60px;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;}
  .hw-row:last-child{border-bottom:none;}
  .hw-row .check{width:14px;height:14px;border-radius:50%;background:var(--bg-panel-3);border:1px solid var(--border-light);}
  .hw-row.done .check{background:var(--green);border-color:var(--green);}
  .hw-row.current .check{background:var(--yellow);border-color:var(--yellow);animation:pulse 1.8s infinite;}
  .hw-row .score-inline{text-align:right;font-weight:600;font-family:"SF Mono",monospace;font-size:11px;color:var(--text-dim);}
  .hw-row.done .score-inline{color:var(--green-light);}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
  .pipe-sections{display:flex;flex-direction:column;gap:8px;margin-top:14px;}
  .pipe-section{background:var(--bg-panel-2);border:1px solid var(--border);border-radius:6px;padding:12px;}
  .pipe-section .sub-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--accent-2);margin-bottom:8px;}
  .pipe-section ul{list-style:none;padding:0;}
  .pipe-section li{font-size:11px;padding:5px 0;border-bottom:1px dashed rgba(75,85,99,0.4);line-height:1.5;}
  .pipe-section li:last-child{border-bottom:none;}
  .resource-item{display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg-panel-2);border:1px solid var(--border);border-radius:6px;margin-bottom:8px;font-size:12px;}
  .resource-item .icon{width:28px;height:28px;background:var(--bg-panel-3);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
  .resource-item .info{flex:1;min-width:0;}
  .resource-item .title{font-weight:600;color:var(--text);margin-bottom:2px;}
  .resource-item .meta{font-size:10px;color:var(--text-dim);}
  .action-btn{display:inline-block;padding:7px 14px;background:var(--accent);color:white;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px;transition:background 0.15s;}
  .action-btn:hover{background:var(--accent-2);}
  .action-btn.secondary{background:var(--bg-panel-2);border:1px solid var(--border);}
  .action-btn.small{padding:5px 10px;font-size:11px;}
  .progress-bar{height:6px;background:var(--bg-panel-3);border-radius:3px;overflow:hidden;margin:4px 0;}
  .progress-bar .fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--purple));transition:width 0.6s ease;}
  .progress-bar.green .fill{background:linear-gradient(90deg,var(--green),var(--green-light));}
  .progress-bar.yellow .fill{background:linear-gradient(90deg,var(--yellow),var(--yellow-light));}
  .progress-bar.red .fill{background:linear-gradient(90deg,var(--red),var(--red-light));}
  .maria-profile{background:linear-gradient(135deg,rgba(236,72,153,0.1),rgba(139,92,246,0.1));border:1px solid var(--pink);border-radius:8px;padding:14px;margin-bottom:14px;}
  .maria-profile .name{font-size:16px;font-weight:700;color:var(--pink-light);margin-bottom:2px;}
  .maria-profile .biz{font-size:13px;color:var(--text);margin-bottom:8px;font-weight:500;}
  .maria-profile .attrs{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
  .hat-fate-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:11px;}
  .hat-fate-row:last-child{border-bottom:none;}
  .hat-fate-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  /* Sidebar toggle button */
  #sidebar-toggle{display:none;position:absolute;top:12px;right:12px;z-index:300;background:var(--bg-panel);border:1px solid var(--border);color:var(--text);width:44px;height:44px;border-radius:8px;font-size:20px;cursor:pointer;font-family:inherit;line-height:1;-webkit-tap-highlight-color:transparent;}
  /* Canvas overlay for detail popups on mobile */
  #canvas-overlay{display:none;position:fixed;bottom:12px;left:12px;right:12px;max-height:50vh;overflow-y:auto;background:rgba(17,24,39,0.96);backdrop-filter:blur(14px);border:1px solid var(--border);border-radius:10px;padding:18px 16px;z-index:250;font-size:13px;line-height:1.5;color:var(--text);-webkit-overflow-scrolling:touch;}
  #canvas-overlay.visible{display:block;}
  #canvas-overlay .detail-box{margin-top:0;}
  #canvas-overlay .title{font-size:14px;font-weight:700;color:var(--accent-2);}
  #canvas-overlay .meta{font-size:10px;color:var(--text-dim);margin-bottom:6px;}
  #canvas-overlay .close-btn{position:sticky;top:0;float:right;background:var(--bg-panel-2);border:1px solid var(--border);color:var(--text);width:32px;height:32px;border-radius:6px;font-size:20px;cursor:pointer;line-height:1;padding:0;text-align:center;z-index:91;-webkit-tap-highlight-color:transparent;}
  #canvas-overlay .close-btn:hover{color:var(--text);background:var(--border);}
  #canvas-overlay h3{font-size:14px;font-weight:700;color:var(--accent-2);margin-bottom:8px;}
  #canvas-overlay p{font-size:12px;margin-bottom:6px;}
  /* Mobile responsive */
  @media(max-width:900px){
    main{grid-template-columns:1fr !important;}
    aside#info-panel{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;padding:60px 20px 20px;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg-panel);}
    aside#info-panel.open{display:block;}
    aside#info-panel.open::before{content:'';position:fixed;top:0;left:0;right:0;height:50px;background:var(--bg-panel);z-index:1;}
    #sidebar-toggle{display:block;position:fixed;top:auto;bottom:12px;right:12px;}
    header{padding:6px 10px;gap:6px;flex-wrap:nowrap;overflow:hidden;max-height:80px;}
    header h1{font-size:13px;flex-shrink:0;}
    header .subtitle{display:none;}
    nav#scene-nav{margin-left:0;gap:3px;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;padding-bottom:2px;flex:1;min-width:0;}
    nav button{padding:4px 7px;font-size:9px;white-space:nowrap;flex-shrink:0;}
    .stage-counter{top:10px;left:10px;padding:6px 10px;font-size:10px;}
    .overlay-hint{bottom:10px;left:10px;font-size:10px;padding:6px 10px;}
    .breadcrumb{top:10px;right:56px;font-size:10px;padding:6px 10px;}
    .scoreboard{grid-template-columns:1fr 1fr 1fr;gap:6px;}
    .score-tile .num{font-size:18px;}
    .dash-grid{grid-template-columns:1fr 1fr;gap:6px;}
  }
  @media(max-width:480px){
    nav button{padding:4px 6px;font-size:9px;}
    .scoreboard{grid-template-columns:1fr 1fr;gap:5px;}
  }
</style>
</head>

let orbitState={dragging:false,lastX:0,lastY:0,theta:0,phi:Math.PI/3,radius:30,target:new THREE.Vector3(0,0,0),targetRadius:30,targetTheta:0,targetPhi:Math.PI/3};
let mouseDownPos={x:0,y:0};

function init(){
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x0a0e1a);
  scene.fog=new THREE.Fog(0x0a0e1a,60,180);
  const w=container.clientWidth,h=container.clientHeight;
  camera=new THREE.PerspectiveCamera(50,w/h,0.1,500);
  renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(w,h);
  container.appendChild(renderer.domElement);
  raycaster=new THREE.Raycaster();
  mouse=new THREE.Vector2();
  clock=new THREE.Clock();
  updateCamera();
  setupControls();
  setupLights();
  window.addEventListener('resize',onResize);
  nav.querySelectorAll('button').forEach(btn=>{
    btn.addEventListener('click',()=>{
      nav.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      loadScene(btn.dataset.scene);
    });
  });
  loadScene('problem');
  animate();
}

function updateCamera(){
  const{theta,phi,radius,target}=orbitState;
  camera.position.x=target.x+radius*Math.sin(phi)*Math.sin(theta);
  camera.position.y=target.y+radius*Math.cos(phi);
  camera.position.z=target.z+radius*Math.sin(phi)*Math.cos(theta);
  camera.lookAt(target);
}

function setupControls(){
  const dom=renderer.domElement;
  let isPanning=false;
  dom.addEventListener('mousedown',e=>{
    isPanning=e.button===2||e.shiftKey; // right-click or shift+click to pan
    orbitState.dragging=true;orbitState.lastX=e.clientX;orbitState.lastY=e.clientY;mouseDownPos.x=e.clientX;mouseDownPos.y=e.clientY;
  });
  dom.addEventListener('contextmenu',e=>e.preventDefault()); // prevent right-click menu
  window.addEventListener('mouseup',()=>{orbitState.dragging=false;isPanning=false;});
  window.addEventListener('mousemove',e=>{
    if(!orbitState.dragging)return;
    const dx=e.clientX-orbitState.lastX,dy=e.clientY-orbitState.lastY;
    if(isPanning){
      // Pan: move target point
      const panSpeed=0.03*orbitState.radius/20;
      const right=new THREE.Vector3();const up=new THREE.Vector3();
      camera.getWorldDirection(up);
      right.crossVectors(up,camera.up).normalize();
      up.copy(camera.up).normalize();
      orbitState.target.addScaledVector(right,-dx*panSpeed);
      orbitState.target.addScaledVector(up,dy*panSpeed);
    } else {
      // Rotate
      orbitState.theta-=dx*0.007;
      orbitState.phi-=dy*0.007;
      orbitState.phi=Math.max(0.15,Math.min(Math.PI-0.15,orbitState.phi));
    }
    orbitState.lastX=e.clientX;orbitState.lastY=e.clientY;
    updateCamera();
  });
  dom.addEventListener('wheel',e=>{
    e.preventDefault();
    orbitState.radius*=(1+e.deltaY*0.0012);
    orbitState.radius=Math.max(5,Math.min(250,orbitState.radius));
    orbitState.targetRadius=orbitState.radius;
    updateCamera();
  },{passive:false});
  dom.addEventListener('click',e=>{
    const dist=Math.hypot(e.clientX-mouseDownPos.x,e.clientY-mouseDownPos.y);
    if(dist>3)return;
    if(!currentScene||!currentScene.onClick)return;
    const rect=renderer.domElement.getBoundingClientRect();
    mouse.x=((e.clientX-rect.left)/rect.width)*2-1;
    mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;
    raycaster.setFromCamera(mouse,camera);
    currentScene.onClick(raycaster);
  });
}

function setupLights(){
  scene.add(new THREE.AmbientLight(0x404e6e,1.0));
  const key=new THREE.DirectionalLight(0xffffff,0.9);key.position.set(12,22,12);scene.add(key);
  const rim=new THREE.DirectionalLight(0x60a5fa,0.55);rim.position.set(-12,6,-10);scene.add(rim);
  const fill=new THREE.PointLight(0x8b5cf6,0.5,50);fill.position.set(0,12,6);scene.add(fill);
}

function onResize(){
  const w=container.clientWidth,h=container.clientHeight;
  camera.aspect=w/h;camera.updateProjectionMatrix();renderer.setSize(w,h);
}

function animate(){
  animationId=requestAnimationFrame(animate);
  if(currentScene&&currentScene.update)currentScene.update();
  renderer.render(scene,camera);
}

function clearScene(){
  const toRemove=[...scene.children];
  toRemove.forEach(obj=>{scene.remove(obj);disposeObject(obj);});
  setupLights();
}

function disposeObject(obj){
  obj.traverse&&obj.traverse(child=>{
    if(child.geometry)child.geometry.dispose();
    if(child.material){
      if(Array.isArray(child.material)){child.material.forEach(m=>{if(m.map)m.map.dispose();m.dispose();});}
      else{if(child.material.map)child.material.map.dispose();child.material.dispose();}
    }
  });
}

function setBreadcrumb(parts){
  if(!parts||parts.length===0){breadcrumbEl.style.display='none';return;}
  breadcrumbEl.style.display='block';
  breadcrumbEl.innerHTML=parts.map((p,i)=>
    i<parts.length-1
      ?`<span class="crumb">${p}</span><span class="sep">&rsaquo;</span>`
      :`<span class="crumb" style="color:var(--accent-2)">${p}</span>`
  ).join('');
}

function loadScene(name){
  if(currentScene&&currentScene.exit)currentScene.exit();
  clearScene();
  currentScene=scenes[name];currentSceneName=name;
  const titles={problem:"The Problem",journey:"Maria's Journey",dataflow:"Data Flow",student:"Student View",coaching:"Coach View",trajectories:"Cohort Trajectories",hatsoff:"Hats Come Off"};
  const order=["problem","journey","dataflow","student","coaching","trajectories","hatsoff"];
  stageCounter.querySelector('.small').textContent=`Scene ${order.indexOf(name)+1} of 7`;
  stageTitleEl.textContent=titles[name];
  setBreadcrumb(null);
  currentScene.enter();
}

function makeLabel(text,color='#f3f4f6',size=1,bg=null,fontPx=42){
  const canvas=document.createElement('canvas');
  canvas.width=512;canvas.height=128;
  const ctx=canvas.getContext('2d');
  if(bg){ctx.fillStyle=bg;ctx.fillRect(4,30,canvas.width-8,68);}
  ctx.font=`bold ${fontPx}px -apple-system,"Segoe UI",Inter,sans-serif`;
  ctx.fillStyle=color;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor='rgba(0,0,0,0.85)';ctx.shadowBlur=4;
  ctx.fillText(text,canvas.width/2,canvas.height/2);
  const tex=new THREE.CanvasTexture(canvas);tex.needsUpdate=true;
  const mat=new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false,depthTest:true});
  const sprite=new THREE.Sprite(mat);
  sprite.scale.set(size*4,size,1);
  return sprite;
}

function buildConnector(from,to,color=0x60a5fa,thickness=0.04){
  const dir=new THREE.Vector3().subVectors(to,from);

  mesh.position.copy(from).add(dir.multiplyScalar(0.5));
  mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),to.clone().sub(from).normalize());
  return mesh;

      const color=CATEGORY_COLORS[hat.category];

      scene.add(obj);

      <h3>The Math</h3><p><strong>75 hours</strong> per cohort on monthly assessments alone. Add weekly homework grading (25 participants &times; 48 weekly assignments = 1,200 submissions per cohort) and the load roughly doubles.</p>

  },
  update(){
    const t=clock.getElapsedTime();
    this.hats.forEach((h,i)=>{

      h.obj.position.x=Math.cos(angle)*baseRadius;h.obj.position.z=Math.sin(angle)*baseRadius;
      h.obj.position.y=baseHeight+Math.sin(t*1.2+i*0.5)*0.2;

    }
  }
};

  drillToTopic(topicData){
    this.clearDrilldown();this.activeTopic=topicData;this.activeSubtopic=null;this.activeFocus=null;
    const tn=this.topicNodes.find(n=>n.topic.id===topicData.id);if(!tn)return;

    const outDir=basePos.clone().normalize(),tangent=new THREE.Vector3(-outDir.z,0,outDir.x);
    topicData.subtopics.forEach((sub,i)=>{
      const pos=basePos.clone().add(outDir.clone().multiplyScalar(3.5)).add(tangent.clone().multiplyScalar((i-1)*2.4));pos.y=1.5;
      const obj=buildSubtopicNode(topicData.color,0.5);obj.position.copy(pos);
      if(sub.current)obj.scale.setScalar(1.3);
      obj.userData={subtopic:sub,topic:topicData};scene.add(obj);
      const label=makeLabel(sub.name,sub.current?'#fbbf24':'#d1d5db',0.35);label.position.copy(pos);label.position.y+=1.0;scene.add(label);
      const connector=buildConnector(basePos,pos,topicData.color,0.03);scene.add(connector);
      this.subtopicNodes.push({obj,label,connector,subtopic:sub,pos});
    });
    setBreadcrumb(['Program',`M${topicData.month} ${topicData.name}`]);

      ${ms.flag?`<div class="detail-box" style="border-left-color:#ef4444"><div style="color:#f87171;font-weight:600;font-size:12px">&#9888; Coach Flag</div><p style="margin-top:4px;font-size:11px">${ms.flag}</p></div>`:''}
      <h3>Subtopics (Level 2)</h3><ul style="margin-top:8px">${topicData.subtopics.map(s=>`<li><strong style="color:${s.current?'#fbbf24':'var(--text)'}">${s.name}</strong>${s.current?' <span class="pill yellow">Active</span>':''}<br><span style="color:var(--text-dim);font-size:10px">${s.focus.length} focus areas</span></li>`).join('')}</ul>
      <button class="action-btn secondary small" onclick="scenes.journey.showOverview()">&larr; Back to Overview</button>`;
  },

  drillToSubtopic(subtopicData,topicData){
    this.focusNodes.forEach(n=>{scene.remove(n.obj);disposeObject(n.obj);if(n.label)scene.remove(n.label);if(n.connector)scene.remove(n.connector);});
    this.decisionNodes.forEach(n=>{scene.remove(n.obj);disposeObject(n.obj);if(n.label)scene.remove(n.label);if(n.connector)scene.remove(n.connector);});
    this.focusNodes=[];this.decisionNodes=[];this.activeSubtopic=subtopicData;this.activeFocus=null;
    const subNode=this.subtopicNodes.find(n=>n.subtopic.name===subtopicData.name);if(!subNode)return;
    const basePos=subNode.pos.clone();
    const outDir=basePos.clone().setY(0).normalize(),tangent=new THREE.Vector3(-outDir.z,0,outDir.x);
    subtopicData.focus.forEach((foc,i)=>{
      const pos=basePos.clone().add(outDir.clone().multiplyScalar(2.6)).add(tangent.clone().multiplyScalar((i-1)*1.4));pos.y=2.8;
      const obj=buildFocusArea(topicData.color,foc.type);obj.position.copy(pos);obj.scale.setScalar(foc.current?1.4:1.0);
      obj.userData={focus:foc,topic:topicData,subtopic:subtopicData};scene.add(obj);
      const lbl=makeLabel(foc.title.length>24?foc.title.slice(0,22)+'\u2026':foc.title,foc.current?'#fbbf24':'#d1d5db',0.3);
      lbl.position.copy(pos);lbl.position.y+=0.55;scene.add(lbl);
      const connector=buildConnector(basePos,pos,topicData.color,0.025);scene.add(connector);
      this.focusNodes.push({obj,label:lbl,connector,focus:foc,pos});
    });
    setBreadcrumb(['Program',`M${topicData.month} ${topicData.name}`,subtopicData.name]);
    panel.innerHTML=`<h2 style="font-size:18px">${subtopicData.name}</h2><p class="lead">Subtopic under <strong>${topicData.name}</strong>. Three focus areas assigned at this level.</p>
      <h3>Focus Areas (Level 3)</h3>
      ${subtopicData.focus.map(foc=>`<div class="resource-item" onclick="scenes.journey.drillToFocus('${foc.title.replace(/'/g,"\\'")}')" style="cursor:pointer"><div class="icon">${foc.type==='workbook'?'📓':foc.type==='test'?'📝':foc.type==='link'?'🔗':'📄'}</div><div class="info"><div class="title">${foc.title}${foc.current?' <span class="pill yellow" style="margin-left:4px">Active</span>':''}</div><div class="meta">${foc.type}</div></div></div>`).join('')}

  },

  drillToFocus(focusTitle){
    this.decisionNodes.forEach(n=>{scene.remove(n.obj);disposeObject(n.obj);if(n.label)scene.remove(n.label);if(n.connector)scene.remove(n.connector);});
    this.decisionNodes=[];
    const foc=this.activeSubtopic.focus.find(f=>f.title===focusTitle);if(!foc)return;
    this.activeFocus=foc;
    const topicData=this.activeTopic,subtopicData=this.activeSubtopic;
    setBreadcrumb(['Program',`M${topicData.month} ${topicData.name}`,subtopicData.name,foc.title]);
    let treeHTML='';
    if(foc.current&&foc.title.includes('Decision Tree')){
      this._buildDecisionTreeVisual();
      treeHTML=`<h3>Decision Tree &mdash; Maria's Active Work</h3><p style="font-size:11px">Maria is evaluating AI/automation options across four decision branches, filtered by her constraints: pre-revenue budget, Squarespace website, no existing CRM.</p>
        ${DECISION_TREE.branches.map(b=>`<div class="pipe-section" style="border-left:3px solid #${b.color.toString(16).padStart(6,'0')}"><div class="sub-label" style="color:#${b.color.toString(16).padStart(6,'0')}">${b.name}</div><ul>${b.children.map(c=>`<li><strong>${c.name}</strong><br><span style="color:var(--text-dim);font-size:10px">${c.tools.join(' &middot; ')}</span></li>`).join('')}</ul></div>`).join('')}`;
    }
    panel.innerHTML=`<h2 style="font-size:17px">${foc.title}</h2><p class="lead">Focus area &middot; Type: <strong>${foc.type}</strong></p>
      ${foc.detail?`<div class="detail-box"><p style="font-size:12px">${foc.detail}</p></div>`:''}
      ${treeHTML}
      <h3>What's in a Focus Area</h3><p style="font-size:11px">Every focus area is a unit of work: a worksheet, workbook chapter, test, or external resource. The rules engine assigns them based on <code>topic &times; industry &times; stage</code> matching.</p>
      <button class="action-btn secondary small" onclick="scenes.journey.drillToSubtopic(scenes.journey.activeSubtopic,scenes.journey.activeTopic)">&larr; Back to ${subtopicData.name}</button>`;
  },

  _buildDecisionTreeVisual(){
    const afn=this.focusNodes.find(n=>n.focus.current);if(!afn)return;
    const basePos=afn.pos.clone();
    const outDir=basePos.clone().setY(0).normalize(),tangent=new THREE.Vector3(-outDir.z,0,outDir.x);
    DECISION_TREE.branches.forEach((branch,bi)=>{
      const branchPos=basePos.clone().add(outDir.clone().multiplyScalar(2.5)).add(tangent.clone().multiplyScalar((bi-1.5)*1.8));branchPos.y+=1.5;
      const bn=new THREE.Mesh(new THREE.SphereGeometry(0.25,12,12),new THREE.MeshStandardMaterial({color:branch.color,emissive:branch.color,emissiveIntensity:0.5}));
      bn.position.copy(branchPos);scene.add(bn);
      const lbl=makeLabel(branch.name.length>18?branch.name.slice(0,16)+'\u2026':branch.name,'#'+branch.color.toString(16).padStart(6,'0'),0.28);lbl.position.copy(branchPos);lbl.position.y+=0.5;scene.add(lbl);
      const conn=buildConnector(basePos,branchPos,branch.color,0.02);scene.add(conn);
      this.decisionNodes.push({obj:bn,label:lbl,connector:conn});
      branch.children.forEach((leaf,li)=>{
        const lp=branchPos.clone().add(outDir.clone().multiplyScalar(1.5)).add(tangent.clone().multiplyScalar((li-1)*0.5));lp.y+=(li-1)*0.6;
        const ln=new THREE.Mesh(new THREE.BoxGeometry(0.22,0.22,0.22),new THREE.MeshStandardMaterial({color:branch.color,emissive:branch.color,emissiveIntensity:0.3,transparent:true,opacity:0.8}));
        ln.position.copy(lp);scene.add(ln);
        const lc=buildConnector(branchPos,lp,branch.color,0.015);scene.add(lc);
        this.decisionNodes.push({obj:ln,label:null,connector:lc});
      });
    });
  },

  update(){
    const t=clock.getElapsedTime();
    this.topicNodes.forEach((n,i)=>{n.obj.rotation.y=t*0.25;n.obj.position.y=Math.sin(t*0.8+i*0.5)*0.2;});
    this.subtopicNodes.forEach(n=>{n.obj.rotation.y=t*0.3;n.obj.rotation.x=t*0.2;});
    this.focusNodes.forEach((n,i)=>{n.obj.rotation.y=t*0.4+i;});
    this.decisionNodes.forEach(n=>{if(n.obj)n.obj.rotation.y=t*0.5;});
    const pulse=0.6+Math.sin(t*2)*0.2;this.pathLines.forEach(p=>{p.material.opacity=pulse;});
  },

  onClick(raycaster){
    const focusMeshes=[];this.focusNodes.forEach(n=>n.obj.traverse(m=>{if(m.isMesh){m.userData.focusNode=n;focusMeshes.push(m);}}));
    const fh=raycaster.intersectObjects(focusMeshes);
    if(fh.length>0){this.drillToFocus(fh[0].object.userData.focusNode.focus.title);return;}
    const subMeshes=[];this.subtopicNodes.forEach(n=>n.obj.traverse(m=>{if(m.isMesh){m.userData.subNode=n;subMeshes.push(m);}}));
    const sh=raycaster.intersectObjects(subMeshes);
    if(sh.length>0){this.drillToSubtopic(sh[0].object.userData.subNode.subtopic,this.activeTopic);return;}
    const topMeshes=[];this.topicNodes.forEach(n=>n.obj.traverse(m=>{if(m.isMesh){m.userData.topicNode=n;topMeshes.push(m);}}));
    const th=raycaster.intersectObjects(topMeshes);
    if(th.length>0)this.drillToTopic(th[0].object.userData.topicNode.topic);
  },
  exit(){this.clearDrilldown();}
};

    if(hits.length>0){const nd=hits[0].object.userData.nodeRef;if(nd)this.expandNode(nd.id);}
  }

  dots:[],lines:[],selectedIdx:-1,monthProgress:1.0,trendArrow:null,trendLabel:null,
  enter(){
    orbitState.theta=0;orbitState.phi=Math.PI/2;orbitState.radius=30;orbitState.target.set(5,5,0);updateCamera();
    const scale=0.1;
    // Axes

    scene.add(new THREE.Line(xGeo,new THREE.LineBasicMaterial({color:0x60a5fa,transparent:true,opacity:0.6})));
    const yGeo=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0),new THREE.Vector3(0,10,0)]);
    scene.add(new THREE.Line(yGeo,new THREE.LineBasicMaterial({color:0x10b981,transparent:true,opacity:0.6})));
    // Grid
    const grid=new THREE.GridHelper(10,10,0x1f2937,0x1f2937);grid.position.set(5,0,0);grid.material.transparent=true;grid.material.opacity=0.3;scene.add(grid);
    // Axis labels
    const xLbl=makeLabel('BUSINESS READINESS →','#60a5fa',0.8);xLbl.position.set(5,-1.2,0);scene.add(xLbl);
    const yLbl=makeLabel('EXECUTION CAPABILITY →','#10b981',0.8);yLbl.position.set(-2,5,0);scene.add(yLbl);
    // Tick marks
    for(let i=0;i<=100;i+=20){const lbl=makeLabel(String(i),'#6b7280',0.35);lbl.position.set(i*scale,-0.6,0);scene.add(lbl);}
    for(let i=0;i<=100;i+=20){const lbl=makeLabel(String(i),'#6b7280',0.35);lbl.position.set(-0.8,i*scale,0);scene.add(lbl);}

    const riskColors={low:0x10b981,medium:0xf59e0b,high:0xef4444,critical:0xdc2626};
    this.dots=[];this.lines=[];
    COHORT_DATA.forEach((p,i)=>{
      const pos=this.getPos(p,1.0);
      const geo=new THREE.SphereGeometry(p.risk==='critical'?0.25:0.18,16,16);
      const color=riskColors[p.risk]||0x60a5fa;
      const mat=new THREE.MeshStandardMaterial({color,emissive:color,emissiveIntensity:p.risk==='critical'?0.8:0.4,roughness:0.2});
      const mesh=new THREE.Mesh(geo,mat);
      mesh.position.copy(pos);
      mesh.userData={participant:p,index:i};
      scene.add(mesh);
      // Trajectory arrow (hidden by default)
      const startPos=new THREE.Vector3(p.start.x*scale,p.start.y*scale,0.05);
      const endPos=new THREE.Vector3(p.end.x*scale,p.end.y*scale,0.05);
      const arrowGeo=new THREE.BufferGeometry().setFromPoints([startPos,endPos]);
      const arrowLine=new THREE.Line(arrowGeo,new THREE.LineBasicMaterial({color,transparent:true,opacity:0,linewidth:2}));
      scene.add(arrowLine);
      // Arrowhead
      const dir=endPos.clone().sub(startPos).normalize();
      const headLen=0.3;const headGeo=new THREE.ConeGeometry(0.1,headLen,6);
      const headMesh=new THREE.Mesh(headGeo,new THREE.MeshBasicMaterial({color,transparent:true,opacity:0}));
      headMesh.position.copy(endPos);
      headMesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),dir);
      scene.add(headMesh);
      const label=makeLabel(p.name.split(' ')[0],'#9ca3af',0.28);label.position.copy(pos);label.position.y+=0.4;label.material.opacity=0.5;scene.add(label);
      this.dots.push({mesh,arrowLine,arrowHead:headMesh,label,participant:p});
    });

    // Cohort trend arrow
    const avgStart=COHORT_DATA.reduce((a,p)=>({x:a.x+p.start.x,y:a.y+p.start.y}),{x:0,y:0});
    const avgEnd=COHORT_DATA.reduce((a,p)=>({x:a.x+p.end.x,y:a.y+p.end.y}),{x:0,y:0});
    const n=COHORT_DATA.length;
    avgStart.x/=n;avgStart.y/=n;avgEnd.x/=n;avgEnd.y/=n;
    const tStart=new THREE.Vector3(avgStart.x*scale,avgStart.y*scale,-0.1);
    const tEnd=new THREE.Vector3(avgEnd.x*scale,avgEnd.y*scale,-0.1);
    const tGeo=new THREE.BufferGeometry().setFromPoints([tStart,tEnd]);
    this.trendArrow=new THREE.Line(tGeo,new THREE.LineBasicMaterial({color:0x60a5fa,transparent:true,opacity:0,linewidth:3}));
    scene.add(this.trendArrow);
    const tDir=tEnd.clone().sub(tStart).normalize();
    const tHead=new THREE.Mesh(new THREE.ConeGeometry(0.2,0.5,8),new THREE.MeshBasicMaterial({color:0x60a5fa,transparent:true,opacity:0}));
    tHead.position.copy(tEnd);tHead.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),tDir);scene.add(tHead);
    this.trendHead=tHead;
    const rdyDelta=Math.round(avgEnd.x-avgStart.x);const capDelta=Math.round(avgEnd.y-avgStart.y);
    this.trendLabel=makeLabel(`Cohort: +${rdyDelta}% readiness, +${capDelta}% capability`,'#60a5fa',0.5);
    this.trendLabel.position.set((avgStart.x+avgEnd.x)/2*scale,(avgStart.y+avgEnd.y)/2*scale+0.8,-0.1);
    this.trendLabel.material.opacity=0;scene.add(this.trendLabel);

    this.selectedIdx=-1;this.monthProgress=1.0;
    this.buildPanel();
  },
  getPos(p,t){
    const scale=0.1;
    const x=p.start.x+(p.end.x-p.start.x)*t;
    const y=p.start.y+(p.end.y-p.start.y)*t;
    return new THREE.Vector3(x*scale,y*scale,(Math.random()-0.5)*0.3);
  },
  buildPanel(){
    const listHtml=COHORT_DATA.map((p,i)=>{
      const riskPill={low:'green',medium:'yellow',high:'red',critical:'red'}[p.risk];
      const sel=this.selectedIdx===i?' style="background:var(--bg-panel-2);border-left:3px solid var(--accent)"':'';
      return `<div class="participant-row" onclick="scenes.trajectories.selectParticipant(${i})"${sel}>
        <span class="pill ${riskPill}" style="font-size:9px">${p.risk}</span> ${p.name}
        <span style="color:var(--text-dim);font-size:11px;margin-left:auto">${p.industry}</span>
      </div>`;
    }).join('');
    const detail=this.selectedIdx>=0?this.getDetail(COHORT_DATA[this.selectedIdx]):'<p style="color:var(--text-dim)">Click a participant to see their trajectory.</p>';
    panel.innerHTML=`
      <h2>Cohort Trajectories</h2>
      <p class="lead">Each dot is a participant. Position shows Business Readiness (X) vs Execution Capability (Y). Arrows show movement from cohort start to current month.</p>
      <div style="display:flex;gap:8px;margin:10px 0">
        <button class="action-btn" onclick="scenes.trajectories.showAllTrajectories()">Show All Trajectories</button>
        <button class="action-btn secondary" onclick="scenes.trajectories.hideAllTrajectories()">Reset</button>
      </div>
      <h3>Month Slider</h3>
      <input type="range" min="0" max="100" value="100" style="width:100%;accent-color:var(--accent)" oninput="scenes.trajectories.setMonth(this.value/100)">
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-dim)"><span>Month 1</span><span>Month 12</span></div>
      <h3>Participants (${COHORT_DATA.length})</h3>
      <div style="max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:6px;padding:4px">${listHtml}</div>
      <div id="detail-slot" style="margin-top:12px">${detail}</div>
    `;
  },
  getDetail(p){
    const dx=p.end.x-p.start.x;const dy=p.end.y-p.start.y;
    const trendDir=dx>0&&dy>0?'↑↗ Improving':dx<0||dy<0?'↓↙ Declining':'→ Flat';
    const trendColor=dx>0&&dy>0?'var(--green)':'var(--red)';
    return `<div class="detail-box" style="border-left-color:${p.risk==='critical'?'var(--red)':p.risk==='high'?'var(--red)':p.risk==='medium'?'var(--yellow)':'var(--green)'}">
      <div class="title">${p.name}</div>
      <div class="meta">${p.industry} · ${p.stage}</div>
      <div style="margin:8px 0"><span class="pill ${p.risk==='critical'||p.risk==='high'?'red':p.risk==='medium'?'yellow':'green'}">${p.risk}</span> <span style="color:${trendColor};font-weight:700">${trendDir}</span></div>
      <p>Readiness: ${p.start.x}% → ${p.end.x}% (${dx>0?'+':''}${dx}%)</p>
      <p>Capability: ${p.start.y}% → ${p.end.y}% (${dy>0?'+':''}${dy}%)</p>
      <p style="margin-top:8px">${p.notes}</p>
    </div>`;
  },
  selectParticipant(idx){
    // Hide previous
    this.dots.forEach((d,i)=>{
      d.arrowLine.material.opacity=0;d.arrowHead.material.opacity=0;
      d.mesh.material.emissiveIntensity=d.participant.risk==='critical'?0.8:0.4;
      d.label.material.opacity=0.5;
    });
    this.trendArrow.material.opacity=0;this.trendHead.material.opacity=0;this.trendLabel.material.opacity=0;
    this.selectedIdx=idx;
    if(idx>=0){
      this.dots[idx].arrowLine.material.opacity=0.8;this.dots[idx].arrowHead.material.opacity=0.8;
      this.dots[idx].mesh.material.emissiveIntensity=1.0;
      this.dots[idx].label.material.opacity=1.0;
    }
    this.buildPanel();
  },
  showAllTrajectories(){
    this.dots.forEach(d=>{d.arrowLine.material.opacity=0.5;d.arrowHead.material.opacity=0.5;d.label.material.opacity=0.7;});
    this.trendArrow.material.opacity=0.8;this.trendHead.material.opacity=0.8;this.trendLabel.material.opacity=1.0;
    this.selectedIdx=-1;
    this.buildPanel();
  },
  hideAllTrajectories(){
    this.dots.forEach(d=>{d.arrowLine.material.opacity=0;d.arrowHead.material.opacity=0;d.label.material.opacity=0.5;
      d.mesh.material.emissiveIntensity=d.participant.risk==='critical'?0.8:0.4;});
    this.trendArrow.material.opacity=0;this.trendHead.material.opacity=0;this.trendLabel.material.opacity=0;
    this.selectedIdx=-1;this.monthProgress=1.0;
    this.buildPanel();
  },
  setMonth(t){
    this.monthProgress=t;const scale=0.1;
    this.dots.forEach(d=>{
      const p=d.participant;
      const x=p.start.x+(p.end.x-p.start.x)*t;
      const y=p.start.y+(p.end.y-p.start.y)*t;
      d.mesh.position.x=x*scale;d.mesh.position.y=y*scale;
      d.label.position.x=x*scale;d.label.position.y=y*scale+0.4;
    });
  },
  update(){
    const t=clock.getElapsedTime();
    this.dots.forEach((d,i)=>{
      if(d.participant.risk==='critical'){
        d.mesh.material.emissiveIntensity=0.5+Math.sin(t*3)*0.4;
      }
      d.mesh.position.z=Math.sin(t*0.5+i*0.3)*0.05;
    });
  },
  onClick(raycaster){
    const meshes=this.dots.map(d=>d.mesh);
    const hits=raycaster.intersectObjects(meshes);
    if(hits.length>0){this.selectParticipant(hits[0].object.userData.index);}
  }
};

// ============================================================
// SCENE 7: Hats Come Off
// ============================================================
scenes.hatsoff={
  hats:[],heather:null,t0:0,

  enter(){
    orbitState.theta=0;orbitState.phi=Math.PI/2.3;orbitState.radius=26;orbitState.target.set(0,1,0);updateCamera();
    this.t0=clock.getElapsedTime();
    this.heather=buildHeather();this.heather.position.y=0;scene.add(this.heather);
    const hl=makeLabel('Heather','#60a5fa',0.9);hl.position.set(0,-2.2,0);scene.add(hl);
    const floor=new THREE.Mesh(new THREE.CircleGeometry(14,48),new THREE.MeshBasicMaterial({color:0x0f2a1a,transparent:true,opacity:0.3}));
    floor.rotation.x=-Math.PI/2;floor.position.y=-2.8;scene.add(floor);
    this.hats=[];
    HATS.forEach((hat,i)=>{
      const angle=(i/HATS.length)*Math.PI*2;
      const type=hat.replacement.type;
      const targetRadius=type==='eliminated'?14:type==='partial'?8.5:5.5;
      const baseRadius=7.5+Math.sin(i*0.8)*1.2;
      const color=type==='eliminated'?0x4b5563:type==='partial'?0xf59e0b:0x10b981;
      const height=Math.sin(i*0.6)*1.5+1.8;
      let obj;
      if(hat.category==='operations')obj=buildGear(0.42,color);
      else if(hat.category==='content')obj=buildBook(0.45,color);
      else if(hat.category==='coaching')obj=buildDialogueBubble(color);
      else obj=buildCompass(color);
      obj.position.set(Math.cos(angle)*baseRadius,height,Math.sin(angle)*baseRadius);
      obj.userData={hat,angle,baseRadius,targetRadius,height,type,color,baseY:height};
      scene.add(obj);
      const labelColor=type==='eliminated'?'#6b7280':type==='partial'?'#fbbf24':'#34d399';
      const label=makeLabel(hat.short,labelColor,0.35);
      label.position.copy(obj.position);label.position.y+=1.0;scene.add(label);
      this.hats.push({obj,label,type});
    });
    this._renderPanel();
  },

  _renderPanel(){
    const elim=HATS.filter(h=>h.replacement.type==='eliminated');
    const partial=HATS.filter(h=>h.replacement.type==='partial');
    const kept=HATS.filter(h=>h.replacement.type==='kept');
    panel.innerHTML=`<h2>Hats Come Off</h2><p class="lead">The same 18 hats &mdash; but now colored by fate. Watch them drift to their new orbits: <strong style="color:#4b5563">gray = eliminated</strong>, <strong style="color:#fbbf24">yellow = partial</strong>, <strong style="color:#34d399">green = kept</strong>.</p>
      <div class="scoreboard">
        <div class="score-tile"><div class="num" style="color:#6b7280">${elim.length}</div><div class="lbl">Eliminated</div></div>
        <div class="score-tile"><div class="num" style="color:#fbbf24">${partial.length}</div><div class="lbl">Partial</div></div>
        <div class="score-tile"><div class="num" style="color:#34d399">${kept.length}</div><div class="lbl">Kept</div></div>
      </div>
      <h3>Eliminated (System takes full ownership)</h3>
      ${elim.map(h=>`<div class="hat-fate-row"><div class="hat-fate-dot" style="background:#4b5563"></div><div><strong>${h.full}</strong><br><span style="color:var(--text-dim);font-size:10px">&rarr; ${h.replacement.by}</span></div></div>`).join('')}
      <h3>Partial (System does heavy lifting; Heather reviews)</h3>
      ${partial.map(h=>`<div class="hat-fate-row"><div class="hat-fate-dot" style="background:#f59e0b"></div><div><strong>${h.full}</strong><br><span style="color:var(--text-dim);font-size:10px">&rarr; ${h.replacement.by}</span></div></div>`).join('')}
      <h3>Kept (Heather owns, system supports)</h3>
      ${kept.map(h=>`<div class="hat-fate-row"><div class="hat-fate-dot" style="background:#10b981"></div><div><strong>${h.full}</strong><br><span style="color:var(--text-dim);font-size:10px">${h.replacement.detail.slice(0,60)}&hellip;</span></div></div>`).join('')}
      <h3>The Outcome</h3>
      <p style="font-size:12px">Heather stops being the bottleneck and starts being the <strong>CEO</strong>. The system carries the operational load; she holds strategy, judgment, relationships, and accountability.</p>
      <p style="font-size:12px">Every green hat above is something the system <em>exists to protect</em> &mdash; these are the things only Heather can do.</p>
      <div class="detail-box" style="border-left-color:#10b981"><div class="title" style="color:#34d399">From 150 hrs/cohort &rarr; ~15 hrs/cohort</div><p style="font-size:11px;margin-top:4px">Assessment review, homework grading, action plan writing, and coaching summary drafting are fully automated. The 10x time return goes back to Heather for the work that actually grows Thrive.</p></div>
      <p style="font-size:12px;color:var(--accent-2);margin-top:12px">Click any hat in the 3D view to see exactly how the system handles it.</p><div id="hat-detail"></div>`;
  },

  update(){
    const t=clock.getElapsedTime();
    const elapsed=t-this.t0;
    const progress=Math.min(elapsed/4,1);// Animate over 4 seconds

    this.hats.forEach((h,i)=>{
      const{angle,baseRadius,targetRadius,baseY,type}=h.obj.userData;
      const r=baseRadius+(targetRadius-baseRadius)*progress;
      const heightTarget=type==='eliminated'?baseY+3:type==='kept'?baseY-1.2:baseY;
      const ht=baseY+(heightTarget-baseY)*progress;
      const wobble=Math.sin(t*1.1+i*0.6)*0.18;
      h.obj.position.x=Math.cos(angle+t*0.07)*r;
      h.obj.position.z=Math.sin(angle+t*0.07)*r;
      h.obj.position.y=ht+wobble;
      h.obj.rotation.y=t*0.3+i;
      if(type==='eliminated'){
        const fade=Math.max(0.05,1-progress*0.95);
        h.obj.traverse(m=>{if(m.material){if(m.material.opacity!==undefined)m.material.opacity=fade;if(m.material.emissiveIntensity!==undefined)m.material.emissiveIntensity=0.15*fade;}});
        h.label.material.opacity=fade;
        if(progress>0.9)h.obj.scale.setScalar(1-(progress-0.9)*10);
      }
      if(type==='kept'&&progress>0.5){
        const glow=0.3+(progress-0.5)*1.4;
        h.obj.traverse(m=>{if(m.material&&m.material.emissiveIntensity!==undefined)m.material.emissiveIntensity=Math.min(glow,1.0);});
      }
      if(type==='partial'){
        const dim=1-progress*0.35;
        h.obj.traverse(m=>{if(m.material&&m.material.opacity!==undefined)m.material.opacity=dim;});
        h.obj.scale.setScalar(1-progress*0.25);
      }
      h.label.position.copy(h.obj.position);h.label.position.y+=1.0;
    });
    if(this.heather)this.heather.rotation.y=Math.sin(t*0.25)*0.15;
  },

  onClick(raycaster){
    const meshes=[];this.hats.forEach(h=>h.obj.traverse(m=>{if(m.isMesh){m.userData.hatRef=h.obj.userData.hat;meshes.push(m);}}));
    const hits=raycaster.intersectObjects(meshes);
    if(hits.length>0){
      const hat=hits[0].object.userData.hatRef;if(!hat)return;
      const slot=document.getElementById('hat-detail');if(!slot)return;
      const col=hat.replacement.type==='eliminated'?'var(--border)':hat.replacement.type==='partial'?'var(--yellow)':'var(--green)';
      slot.innerHTML=`<div class="detail-box" style="border-left-color:${col}">
        <div class="title">${hat.full}</div>
        <div class="meta">${hat.replacement.type==='eliminated'?'&#9746; Fully Automated':hat.replacement.type==='partial'?'&#10003; Partially Automated':'&#9733; Kept by Heather'}</div>
        <p style="font-size:11px;margin-top:6px">${hat.description}</p>
        <p style="font-size:11px;margin-top:6px;color:var(--accent-2)"><strong>System role:</strong> ${hat.replacement.detail}</p>
      </div>`;
    }
  }
};

// MOBILE: Sidebar, overlay, touch controls

function toggleSidebar(){
  const p=document.getElementById('info-panel');
  const btn=document.getElementById('sidebar-toggle');
  if(p.classList.contains('open')){
    p.classList.remove('open');
    btn.textContent='☰';
  } else {
    p.classList.add('open');
    btn.textContent='✕';
  }
}

function closeSidebar(){
  const p=document.getElementById('info-panel');
  const btn=document.getElementById('sidebar-toggle');
  p.classList.remove('open');
  btn.textContent='☰';
}

function closeOverlay(){
  document.getElementById('canvas-overlay').classList.remove('visible');
}

function showOverlay(html){
  const o=document.getElementById('canvas-overlay');
  document.getElementById('overlay-content').innerHTML=html;
  o.classList.add('visible');
}

// Close sidebar when scene changes on mobile
const origLoadScene=loadScene;
loadScene=function(name){
  origLoadScene(name);
  closeSidebar();
  closeOverlay();
};

// ============================================================
// BOOT
// ============================================================
init();

// ============================================================
// TOUCH: Bind after canvas exists
// ============================================================
(function(){
  const c=document.getElementById('canvas-container');
  if(!c)return;
  let lx=0,ly=0,startX=0,startY=0,pinchDist=0,pinchMidX=0,pinchMidY=0,isTap=false;

  // Single-finger rotate + tap-to-click
  c.addEventListener('touchstart',e=>{
    if(e.touches.length===1){
      lx=e.touches[0].clientX;ly=e.touches[0].clientY;
      startX=lx;startY=ly;isTap=true;
    }
    if(e.touches.length===2){
      const dx=e.touches[0].clientX-e.touches[1].clientX;
      const dy=e.touches[0].clientY-e.touches[1].clientY;
      pinchDist=Math.hypot(dx,dy);
      pinchMidX=(e.touches[0].clientX+e.touches[1].clientX)/2;
      pinchMidY=(e.touches[0].clientY+e.touches[1].clientY)/2;
      isTap=false;
    }
  },{passive:true});

  // Unified touchend: handle finger transition, tap detection, and cleanup
  // (replaces both the old tap handler and the transition handler)

  c.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(e.touches.length===1){
      const t=e.touches[0];
      const dx=t.clientX-lx,dy=t.clientY-ly;
      if(Math.abs(dx)>2||Math.abs(dy)>2)isTap=false;
      orbitState.theta-=dx*0.007;
      orbitState.phi-=dy*0.007;
      orbitState.phi=Math.max(0.15,Math.min(Math.PI-0.15,orbitState.phi));
      lx=t.clientX;ly=t.clientY;
      updateCamera();
    }
    if(e.touches.length===2){
      const dx=e.touches[0].clientX-e.touches[1].clientX;
      const dy=e.touches[0].clientY-e.touches[1].clientY;
      const newDist=Math.hypot(dx,dy);
      const newMidX=(e.touches[0].clientX+e.touches[1].clientX)/2;
      const newMidY=(e.touches[0].clientY+e.touches[1].clientY)/2;
      // Zoom from pinch distance change
      if(pinchDist>0){
        const scale=pinchDist/newDist;
        orbitState.radius*=scale;
        orbitState.radius=Math.max(5,Math.min(250,orbitState.radius));
      }
      // Pan from midpoint movement (two fingers dragging in same direction)
      const panDx=newMidX-pinchMidX;
      const panDy=newMidY-pinchMidY;
      if(Math.abs(panDx)>1||Math.abs(panDy)>1){
        const panSpeed=0.025*orbitState.radius/20;
        const right=new THREE.Vector3();const up=new THREE.Vector3();
        camera.getWorldDirection(up);
        right.crossVectors(up,camera.up).normalize();
        up.copy(camera.up).normalize();
        orbitState.target.addScaledVector(right,-panDx*panSpeed);
        orbitState.target.addScaledVector(up,panDy*panSpeed);
      }
      pinchDist=newDist;pinchMidX=newMidX;pinchMidY=newMidY;
      isTap=false;
      updateCamera();
    }
  },{passive:false});

  c.addEventListener('touchend',e=>{
    // When going from 2 fingers to 1, sync lx/ly to remaining finger to prevent snap
    if(e.touches.length===1){
      lx=e.touches[0].clientX;ly=e.touches[0].clientY;
    }
    // Tap detection: if single finger didn't move much, treat as click
    if(isTap&&e.touches.length===0&&e.changedTouches.length===1){
      const t=e.changedTouches[0];
      const dist=Math.hypot(t.clientX-startX,t.clientY-startY);
      if(dist<10&&currentScene&&currentScene.onClick){
        const rect=renderer.domElement.getBoundingClientRect();
        mouse.x=((t.clientX-rect.left)/rect.width)*2-1;
        mouse.y=-((t.clientY-rect.top)/rect.height)*2+1;
        raycaster.setFromCamera(mouse,camera);
        currentScene.onClick(raycaster);
        setTimeout(()=>{
          const detail=document.getElementById('detail-slot')||document.getElementById('hat-detail');
          if(detail&&detail.innerHTML.trim()&&window.innerWidth<=900){
            showOverlay(detail.innerHTML);
          }
        },50);
      }
    }
    pinchDist=0;
  },{passive:true});

  // Prevent default on canvas to stop iOS rubber-banding
  c.addEventListener('gesturestart',e=>e.preventDefault(),{passive:false});
  c.addEventListener('gesturechange',e=>e.preventDefault(),{passive:false});
})();
</script>
